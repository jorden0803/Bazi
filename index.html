<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f3efe7">
<title>八字題目練習</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="app-bar">
    <h1 id="appTitle">練習模式</h1>
  </header>

  <main class="view-container">
    <section id="referenceView" class="view" style="display:none;">
      <div class="ref-tabs" id="refTabs"></div>
      <div class="ref-content" id="refContent"></div>
    </section>

    <section id="practiceView" class="view">
      <div class="picker-row">
        <div class="picker-field">
          <label for="category">大方向</label>
          <select id="category"></select>
        </div>
        <div class="picker-field">
          <label for="topic">細項</label>
          <select id="topic"></select>
        </div>
      </div>

      <div class="stats-bar" id="statsBar"></div>

      <div class="segmented-row">
        <div class="segmented" role="tablist">
          <button id="practiceBtn" class="segmented-btn active" type="button">練習模式</button>
          <button id="reviewBtn" class="segmented-btn" type="button">複習錯題 (<span id="wrongCount">0</span>)</button>
        </div>
        <button id="resetBtn" class="ghost-btn" type="button">重設統計</button>
      </div>

      <main class="quiz-card">
        <p class="prompt" id="prompt">載入中...</p>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <button class="cta-btn next-btn" id="nextBtn" type="button" style="display:none;">下一題</button>
        <p class="review-empty" id="reviewEmpty" style="display:none;">目前沒有錯題,太強了!</p>
      </main>
    </section>

    <section id="testView" class="view" style="display:none;">
      <div id="testIntro">
        <p class="test-intro-text">隨機抽取 20 題,盡量平均分配到各主題,順序打亂。開始後即開始計時,答錯一題會被加罰 5 秒。</p>
        <button id="startTestBtn" class="cta-btn" type="button">開始測驗</button>
      </div>

      <div id="testQuiz" style="display:none;">
        <div class="test-status">
          <span>第 <strong id="testIndex">1</strong> / 20 題</span>
          <span>用時 <strong id="testTimer">00:00</strong></span>
        </div>
        <main class="quiz-card">
          <p class="prompt" id="testPrompt"></p>
          <div class="options" id="testOptions"></div>
        </main>
      </div>

      <div id="testResult" style="display:none;">
        <div class="result-card">
          <p class="result-time" id="resultTime">00:00</p>
          <p class="result-time-label">總用時(含罰秒)</p>
          <div class="result-stats">
            <div><strong id="resultCorrect"></strong><span>答對</span></div>
            <div><strong id="resultWrong"></strong><span>答錯</span></div>
          </div>
        </div>
        <button id="retakeTestBtn" class="cta-btn" type="button">再測一次</button>
      </div>
    </section>
  </main>

  <nav class="tab-bar">
    <button class="tab-btn" data-view="reference" type="button">
      <svg viewBox="0 0 24 24" class="tab-icon"><path d="M4 5c2-1 5-1 8 1v13c-3-2-6-2-8-1V5z"/><path d="M20 5c-2-1-5-1-8 1v13c3-2 6-2 8-1V5z"/></svg>
      <span>背誦</span>
    </button>
    <button class="tab-btn active" data-view="practice" type="button">
      <svg viewBox="0 0 24 24" class="tab-icon"><path d="M4 20l4-1 11-11a2 2 0 0 0 0-3l-1-1a2 2 0 0 0-3 0L4 16l-1 4z"/><path d="M14 6l3 3"/></svg>
      <span>練習</span>
    </button>
    <button class="tab-btn" data-view="test" type="button">
      <svg viewBox="0 0 24 24" class="tab-icon"><circle cx="12" cy="13" r="7"/><path d="M12 13l3-3"/><path d="M9 3h6"/><path d="M12 3v3"/></svg>
      <span>測驗</span>
    </button>
  </nav>
</div>

<script src="js/topics/wuxing.js"></script>
<script src="js/topics/wuxing-zangfu.js"></script>
<script src="js/topics/tiangan-yinyang.js"></script>
<script src="js/topics/dizhi-yinyang.js"></script>
<script src="js/topics/jieqi-yuezhi.js"></script>
<script src="js/topics/dayun-jisuan.js"></script>
<script src="js/topics/wuxing-wang.js"></script>
<script src="js/topics/changsheng.js"></script>
<script src="js/topics/tiangan-wuhe.js"></script>
<script src="js/topics/dizhi-liuhe.js"></script>
<script src="js/topics/dizhi-liuchong.js"></script>
<script src="js/topics/dizhi-sanhe.js"></script>
<script src="js/topics/dizhi-sanhui.js"></script>
<script src="js/topics/dizhi-canggan.js"></script>
<script src="js/topics/rigan-shengke.js"></script>
<script src="js/topics/shishen-shengke.js"></script>
<script src="js/hand-diagram.js"></script>
<script src="js/topics/shouzhang-dizhi.js"></script>
<script src="js/reference-data.js"></script>
<script src="js/quiz-render.js"></script>
<script src="js/app.js"></script>
<script src="js/reference.js"></script>
<script src="js/test.js"></script>
<script src="js/nav.js"></script>
</body>
</html>
